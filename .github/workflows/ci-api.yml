name: CI — API

on:
  push:
    paths: ['classlite-api/**']
  pull_request:
    paths: ['classlite-api/**']

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: classlite_test
          POSTGRES_USER: classlite
          POSTGRES_PASSWORD: test
        ports:
          - '5432:5432'
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: Lint (golangci-lint)
        # Runs the standard-linter set defined in classlite-api/.golangci.yml
        # (errcheck / govet / staticcheck / unused / ineffassign). Replaces the
        # prior standalone `go vet` + `staticcheck` steps — same underlying
        # tools, one binary, one AST walk.
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: classlite-api
      - name: Tenantcheck (R1 mitigation A — GO-1 enforcement)
        # Custom analyzer that fails the build if any method on a *Store type
        # is missing TenantContext as its second parameter. Runs standalone
        # (not through golangci-lint custom binary) so violations point
        # unambiguously to project-context.md GO-1. See
        # _bmad-output/test-artifacts/test-design/pre-epic-2-blockers-2026-06-30.md
        # and tools/tenantcheck/ for the mechanism.
        #
        # Two calls: (a) run the analyzer's own tests — asserts the negative
        # fixtures still fire diagnostics (teeth check); (b) run the analyzer
        # against the real store package.
        run: |
          cd classlite-api
          go test ./tools/tenantcheck/...
          go run ./tools/tenantcheck/cmd/tenantcheck ./internal/store/...
      - name: sqlc vet
        run: |
          go install github.com/sqlc-dev/sqlc/cmd/sqlc@latest
          cd classlite-api
          if find internal/store/queries -name '*.sql' 2>/dev/null | head -1 | grep -q .; then
            sqlc vet
          else
            echo "No query files yet, skipping sqlc vet"
          fi
      - name: Test
        run: cd classlite-api && go test ./... -race -v
        env:
          DATABASE_URL: postgres://classlite:test@localhost:5432/classlite_test?sslmode=disable
      - name: Build
        run: cd classlite-api && go build ./cmd/api/...
