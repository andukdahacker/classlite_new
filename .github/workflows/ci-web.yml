name: CI — Web Dashboard

on:
  push:
    paths:
      - 'classlite-web/**'
      - 'classlite-landing/src/styles/tokens.css'
      - 'scripts/sync-tokens.sh'
      - '.github/workflows/ci-web.yml'
  pull_request:
    paths:
      - 'classlite-web/**'
      - 'classlite-landing/src/styles/tokens.css'
      - 'scripts/sync-tokens.sh'
      - '.github/workflows/ci-web.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Resolve PR base ref
        if: ${{ github.event_name == 'pull_request' }}
        run: git fetch origin ${{ github.base_ref }}
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install
        run: cd classlite-web && npm ci
      - name: Verify tokens.css parity (Story 1.7a AC2)
        run: |
          bash scripts/sync-tokens.sh
          if ! git diff --exit-code -- classlite-landing/src/styles/tokens.css; then
            echo "::error::tokens.css drift detected. Run ./scripts/sync-tokens.sh locally and commit."
            exit 1
          fi
      - name: Guard against hand-edits in components/ui (Story 1.7a AC6 — advisory)
        if: ${{ github.event_name == 'pull_request' }}
        env:
          DIFF_RANGE: origin/${{ github.base_ref }}...HEAD
          LOG_RANGE: origin/${{ github.base_ref }}..HEAD
        run: |
          # `git log A..B` (two dots) shows commits in B not in A — PR commits.
          # Three-dot symmetric difference could match base-only commits on
          # non-fast-forward branches and silently allowlist a PR.
          if git log --format='%B' "$LOG_RANGE" | grep -qF '[shadcn]'; then
            echo "::notice::[shadcn] tag detected — skipping components/ui hand-edit guard."
            exit 0
          fi
          # `:(glob)` enables real recursive ** matching; the default pathspec
          # treats ** as a single segment and misses nested files. Grep covers
          # Added/Deleted/Renamed too — new hand-written primitives and sneaky
          # deletions should also surface, not just modifications.
          changes=$(git diff --name-status "$DIFF_RANGE" -- ':(glob)classlite-web/src/components/ui/**' | grep -E '^(M|A|D|R)' || true)
          if [ -n "$changes" ]; then
            echo "::warning::Changes detected under classlite-web/src/components/ui/ (M/A/D/R):"
            echo "$changes"
            echo "::warning::These files are shadcn-generated (FW-7). If this is a legitimate 'npx shadcn add' re-run, add [shadcn] to the commit message and re-push."
            echo "::warning::If this is a manual edit, FW-7 forbids it. Wrap the change in src/components/domain/ instead, or edit src/index.css for token changes."
          fi
      - name: Lint (ESLint)
        run: cd classlite-web && npm run lint
      - name: Lint (Stylelint)
        run: cd classlite-web && npm run lint:css
      - name: Type check
        run: cd classlite-web && npx tsc --noEmit
      - name: i18n parity (Story 1.7c AC9 — R38 mitigation)
        # Blocks merge when en.json and vi.json key sets diverge or any
        # locale value is empty. Vietnamese is co-primary; a missing key
        # or blank value in vi.json ships as a raw `app.x.y` token (or
        # blank UI) to half the user base — invisible to English-speaking
        # reviewers without this guard. Runs BEFORE Test so a drift fails
        # fast with a readable diff instead of surfacing as confusing
        # missing-key throws inside component tests downstream.
        run: cd classlite-web && npm run i18n-parity
      - name: Test
        run: cd classlite-web && npx vitest run --passWithNoTests
      - name: Build
        run: cd classlite-web && npm run build

  storybook:
    # Story 1d-1 AC6 — Storybook foundation gate. All four checks below
    # are REQUIRED to pass before merge. Soft cap 8 minutes on PR;
    # shard `test-storybook --shard N/M` once the runtime trend exceeds
    # the cap (see classlite-web/docs/storybook-conventions.md § 6).
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install
        run: cd classlite-web && npm ci
      - name: Install Playwright browser (chromium only)
        # The test-runner drives stories via Playwright. Pinning to
        # chromium-only keeps install time under ~25s on the runner.
        run: cd classlite-web && npx playwright install --with-deps chromium
      - name: i18n parity (Story 1.7c AC9 / 1d-1 AC4 — R38 mitigation)
        # Required by both the `test` job and this `storybook` job. The
        # duplication is intentional: it lets the storybook job fail fast
        # on a key drift without waiting on the test job to surface it.
        run: cd classlite-web && npm run i18n-parity
      - name: Storybook build + test-runner (AC3 three-state + AC5 axe + AC7 placement + smoke render)
        # `storybook:test:ci` chains storybook:build → serve → test, so
        # this single step covers Tier A check 5 AND the test-runner pass.
        run: cd classlite-web && npm run storybook:test:ci
      - name: Upload static Storybook artifact
        # Designer access (AC8 § 10) — preview deployment to Cloudflare
        # Pages is a follow-up improvement story; for now the static
        # bundle is downloadable from the Actions run. `if-no-files-found:
        # error` so a failed build that omits the static dir does NOT
        # silently upload an empty artifact (designers would download an
        # empty zip with no obvious cause).
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: storybook-static
          path: classlite-web/storybook-static
          retention-days: 14
          if-no-files-found: error
