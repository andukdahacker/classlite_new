name: CI — Web Dashboard

on:
  push:
    paths: ['classlite-web/**']
  pull_request:
    paths: ['classlite-web/**']

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install
        run: cd classlite-web && npm ci
      - name: Lint
        run: cd classlite-web && npx eslint .
      - name: Type check
        run: cd classlite-web && npx tsc --noEmit
      - name: Test
        run: cd classlite-web && npx vitest run --passWithNoTests
      - name: Build
        run: cd classlite-web && npm run build
