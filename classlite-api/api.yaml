      type: object
      required: [name, startDate, endDate]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 120
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
        sessionCount:
          type: integer
          nullable: true
          minimum: 1

