  # AC7 amended /bmad-code-review 2-5b Round 1 (2026-07-15): terms/holidays/
  # rooms are tenant-scoped tables with RLS 4-policy per Winston-B2, so the
  # RLS layer is authoritative for cross-tenant access on path-{id} routes —
  # a mismatched center_id returns 404 (row invisible under RLS), NOT 403
  # TENANT_MISMATCH. The 2-5a belt-check pattern (GET/PATCH /api/centers/{id})
  # exists because `centers` is global-no-RLS and the handler is the only line
  # of defense. Do NOT add belt-checks to terms/holidays/rooms path-{id}
  # handlers — the RLS predicate already enforces isolation. See
