      type: object
      required: [serverTime]
      properties:
        serverTime:
          type: string
          format: date-time
          description: ISO-8601 UTC timestamp at response render time. Clients use this instead of Date.now() for skew-immune "N seconds ago" affordances.

    EnvelopeRegisterResult:
      type: object
      required: [data]
      properties:
        data:
          $ref: '#/components/schemas/RegisterResult'

    EnvelopeVerifyEmailResult:
      type: object
      required: [data]
      properties:
        data:
          $ref: '#/components/schemas/VerifyEmailResult'

    EnvelopeResendResult:
      type: object
      required: [data]
      properties:
        data:
          $ref: '#/components/schemas/ResendResult'

    EnvelopeVerifyStatusResult:
      type: object
      required: [data]
      properties:
        data:
          $ref: '#/components/schemas/VerifyStatusResult'

    EnvelopeLoginResult:
      type: object
      required: [data]
      properties:
        data:
          $ref: '#/components/schemas/LoginResult'

    EnvelopeLogoutResult:
      type: object
      required: [data]
      properties:
        data:
          $ref: '#/components/schemas/LogoutResult'

    EnvelopeForgotPasswordResult:
      type: object
      required: [data]
      properties:
        data:
          $ref: '#/components/schemas/ForgotPasswordResult'

    EnvelopeResetPasswordResult:
      type: object
      required: [data]
      properties:
        data:
          $ref: '#/components/schemas/ResetPasswordResult'

