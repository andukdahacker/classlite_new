          format: uuid
        name:
          type: string
          minLength: 1
          maxLength: 120
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
          description: MUST be >= startDate (DB CHECK enforces the invariant).
        sessionCount:
          type: integer
          nullable: true
          minimum: 1

