components:
  schemas:
    # ---------------- Request bodies ----------------
    RegisterRequest:
      type: object
      required: [email, password, fullName]
      properties:
        email:
          type: string
          format: email
          maxLength: 320
        password:
          type: string
          minLength: 8
          maxLength: 72
        fullName:
          type: string
          minLength: 1
          maxLength: 200

    VerifyEmailRequest:
      type: object
      required: [token]
      properties:
        token:
          type: string
          minLength: 1

    ResendVerificationRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 1
        rememberMe:
          type: boolean
          default: false

    ForgotPasswordRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email

    ResetPasswordRequest:
      type: object
      required: [token, newPassword]
      properties:
        token:
          type: string
          minLength: 1
        newPassword:
          type: string
          minLength: 8
          maxLength: 72

    # ---------------- Story 2.1 requests ----------------
    SetPersonaRequest:
      type: object
      required: [persona]
      properties:
        persona:
          type: string
          enum: [operator, founder, solo_teacher]

    CreateCenterRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 120
        brandColor:
          type: string
          nullable: true
          description: Hex color like `#3B82F6`. Nullable in v1.
        logoUrl:
          type: string
          nullable: true
          description: Presigned R2 asset URL (finalized in a later story). Nullable in v1.

    UpdateCenterProfileRequest:
      type: object
      description: |
        Story 2-5a partial-update — all fields optional. Only present fields
        are applied. `shortCode` is intentionally absent per AC3 (rendered
        read-only in the Settings UI; changing it would break existing
        class codes).

        Tri-state wire semantics per field (D4 code-review 2026-07-15):
        - **Key absent** — column unchanged.
        - **Key present with JSON `null`** — column CLEARED to SQL NULL
          (nullable fields only: `contactEmail`, `brandColor`, `logoUrl`).
          `null` on `name` or `timezone` returns 422 (non-nullable).
        - **Key present with a string value** — column SET to that value.
        - **Empty string (`""`)** is REJECTED with 422 on every field. The
          client MUST send explicit `null` to clear; empty-string had no
          well-defined semantics in v0 and could be persisted as a distinct
          third state from NULL and a real value.

        Bodies larger than 16 KiB return 413 `PAYLOAD_TOO_LARGE`.
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 120
        contactEmail:
          type: string
          format: email
          nullable: true
          description: |
            Optional. Persisted to `centers.contact_email`. Used later
            (FU-2-5-G) as reply-to for staff/student notification emails —
            consumption is out of scope for story 2-5a.
        brandColor:
          type: string
          nullable: true
        logoUrl:
          type: string
          nullable: true
        timezone:
          type: string
          description: |
            IANA timezone. MUST be one of the 30-entry whitelist below.
            Anything else returns 422 UNSUPPORTED_TIMEZONE.
          enum:
            - Asia/Ho_Chi_Minh
            - Asia/Bangkok
            - Asia/Singapore
            - Asia/Jakarta
            - Asia/Manila
            - Asia/Kuala_Lumpur
            - Asia/Hong_Kong
            - Asia/Shanghai
            - Asia/Taipei
            - Asia/Seoul
            - Asia/Tokyo
            - Asia/Dubai
            - Asia/Kolkata
            - Asia/Karachi
            - Europe/London
            - Europe/Paris
            - Europe/Berlin
            - Europe/Amsterdam
            - Europe/Madrid
            - Europe/Warsaw
            - Europe/Moscow
            - Europe/Istanbul
            - America/New_York
            - America/Chicago
            - America/Denver
            - America/Los_Angeles
            - America/Toronto
            - America/Sao_Paulo
            - Australia/Sydney
            - Pacific/Auckland

    OnboardingProgressPayload:
      type: object
      description: |
        Typed JSONB payload written to `onboarding_progress.payload`. Story 2.1
        pins `schemaVersion: 1`. `templateDraft` remains opaque JSON until
        story 2.2 pins its shape.
      required: [schemaVersion]
      properties:
        schemaVersion:
          type: integer
          const: 1
        personaChoice:
          type: string
          nullable: true
          enum: [operator, founder, solo_teacher]
        centerDraft:
          type: object
          nullable: true
          required: [name]
          properties:
            name:
              type: string
            brandColor:
              type: string
              nullable: true
            logoUrl:
              type: string
              nullable: true
        templateDraft:
          type: object
          nullable: true
          additionalProperties: true

    PutOnboardingProgressRequest:
      type: object
      required: [currentStep, payload]
      properties:
        currentStep:
          type: string
          enum: [persona, center, template, spawn, solo_first_class, done]
        payload:
          $ref: '#/components/schemas/OnboardingProgressPayload'

    # ---------------- Response bodies (data part only) ----------------
    UserSummary:
      type: object
      required: [id, email, fullName, emailVerified]
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        fullName:
          type: string
        emailVerified:
          type: boolean

    RegisterResult:
      type: object
      required: [user, verifyPollId, emailDelivery]
      properties:
        user:
          $ref: '#/components/schemas/UserSummary'
        verifyPollId:
          type: string
          format: uuid
        emailDelivery:
          type: string
          enum: [sent, delayed, failed]
          description: |
            `sent` — verification email was enqueued for delivery. `delayed` —
            reserved for future use when a send is genuinely postponed rather
            than dropped. `failed` — the retry queue rejected the job (buffer
            full); no async retry will occur. The frontend should prompt the
            user to hit Resend Verification when it sees `failed`.

    VerifyEmailResult:
      type: object
      required: [verified, email]
      properties:
        verified:
          type: boolean
        email:
          type: string
          format: email

    ResendResult:
      type: object
      required: [verifyPollId]
      properties:
        verifyPollId:
          type: string
          format: uuid
          nullable: true

    VerifyStatusResult:
      type: object
      required: [verified, email]
      properties:
        verified:
          type: boolean
        email:
          type: string
          format: email

    LoginResult:
      type: object
      required: [accessToken, user]
      properties:
        accessToken:
          type: string
          description: HS256-signed JWT, 15-minute expiry.
        user:
          $ref: '#/components/schemas/UserSummary'

    LogoutResult:
      type: object
      required: [loggedOut]
      properties:
        loggedOut:
          type: boolean

    ForgotPasswordResult:
      type: object
      required: [sent]
      properties:
        sent:
          type: boolean
          description: Always true on a 200 — does not indicate whether an email was actually dispatched (anti-enumeration).

    ResetPasswordResult:
      type: object
      required: [reset]
      properties:
        reset:
          type: boolean

    # ---------------- Story 2.1 result payloads ----------------
    SetPersonaResult:
      type: object
      required: [persona]
      properties:
        persona:
          type: string
          enum: [operator, founder, solo_teacher]

    CenterProfile:
      type: object
      description: |
        Story 2-5a Settings Profile tab payload. Includes contactEmail (new
        in this story) and googleMeetConnected (existing on the row; used
        by the Integrations tab in 2-5c).
      required:
        - id
        - name
        - shortCode
        - contactEmail
        - brandColor
        - logoUrl
        - timezone
        - googleMeetConnected
        - createdAt
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        shortCode:
          type: string
        contactEmail:
          type: string
          format: email
          nullable: true
        brandColor:
          type: string
          nullable: true
        logoUrl:
          type: string
          nullable: true
        timezone:
          type: string
          description: IANA timezone (see UpdateCenterProfileRequest enum for the accepted set).
        googleMeetConnected:
          type: boolean
        createdAt:
          type: string
          format: date-time

    CreateCenterResult:
      type: object
      required: [id, name, shortCode, brandColor, logoUrl, timezone, role, accessToken, expiresAt]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        shortCode:
          type: string
        brandColor:
          type: string
          nullable: true
        logoUrl:
          type: string
          nullable: true
        timezone:
          type: string
          description: |
            Center's timezone in IANA format. Defaults to `Asia/Ho_Chi_Minh`
            in v1 — story 2.5 exposes edit capability.
        role:
          type: string
          enum: [owner]
          description: v1 always `owner` regardless of persona (see FU-2-1-F).
        accessToken:
          type: string
          description: Fresh HS256 JWT with centerId+role claims, 15-minute TTL.
        expiresAt:
          type: string
          format: date-time
          description: ISO-8601 UTC expiry for the new access token.

    OnboardingProgressResult:
      type: object
      required: [currentStep, payload, updatedAt, persona]
      properties:
        currentStep:
          type: string
          enum: [persona, center, template, spawn, solo_first_class, done]
        payload:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/OnboardingProgressPayload'
        updatedAt:
          type: string
          format: date-time
          nullable: true
        persona:
          type: string
          nullable: true
          enum: [operator, founder, solo_teacher]

    PutOnboardingProgressResult:
      type: object
      required: [currentStep, payload, updatedAt]
      properties:
        currentStep:
          type: string
          enum: [persona, center, template, spawn, solo_first_class, done]
        payload:
          $ref: '#/components/schemas/OnboardingProgressPayload'
        updatedAt:
          type: string
          format: date-time

    # ---------------- Story 2.2 — Templates + Spawning ----------------
    CreateTemplateRequest:
      type: object
      required: [name, targetBand, primarySkill, sessionCount, color, sessions]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 120
          description: Rune-count limits (`utf8.RuneCountInString`) — a Vietnamese template name of 120 characters is fine even though the UTF-8 byte length exceeds 120.
        targetBand:
          type: number
          minimum: 1.0
          maximum: 9.0
          description: IELTS band target — allowed values 1.0..9.0 in 0.5 steps.
        primarySkill:
          type: string
          enum: [writing, speaking, listening, reading, listening_reading, all_skills]
        sessionCount:
          type: integer
          minimum: 1
          maximum: 100
        color:
          type: string
          nullable: true
        sessions:
          type: array
          minItems: 1
          maxItems: 100
          description: MUST equal length of sessionCount (AC2 single-source-of-truth).
          items:
            $ref: '#/components/schemas/TemplateSessionInput'

    TemplateSessionInput:
      type: object
      required: [title, description]
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 200
        description:
          type: string
          nullable: true

    Template:
      type: object
      required: [id, name, targetBand, primarySkill, sessionCount, color, scope]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        targetBand:
          type: number
        primarySkill:
          type: string
          enum: [writing, speaking, listening, reading, listening_reading, all_skills]
        sessionCount:
          type: integer
        color:
          type: string
          nullable: true
        scope:
          type: string
          enum: [system, center]

    TemplateSession:
      type: object
      required: [id, title, description, sessionOrder]
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
          nullable: true
        sessionOrder:
          type: integer

    ListTemplatesResult:
      type: object
      required: [templates]
      properties:
        templates:
          type: array
          minItems: 5
          description: |
            System seeds + caller's center-owned templates. The response is
            guaranteed to contain at least the 5 system seeds (per AC1b); if
            fewer are found the handler responds `500 SEED_INCOMPLETE`
            rather than a spec-conformant short response. C2-13 review fix
            — the invariant was previously enforced only at runtime.
          items:
            $ref: '#/components/schemas/Template'

    CreateTemplateResult:
      type: object
      required: [id, name, targetBand, primarySkill, sessionCount, color, scope, sessions]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        targetBand:
          type: number
        primarySkill:
          type: string
          enum: [writing, speaking, listening, reading, listening_reading, all_skills]
        sessionCount:
          type: integer
        color:
          type: string
          nullable: true
        scope:
          type: string
          enum: [center]
        sessions:
          type: array
          items:
            $ref: '#/components/schemas/TemplateSession'

    SpawnClassInput:
      type: object
      required: [cohortName, startDate, teacherEmail]
      properties:
        cohortName:
          type: string
          minLength: 1
          maxLength: 120
        startDate:
          type: string
          format: date
          description: ISO-8601 date (YYYY-MM-DD). Must not be more than 30 days in the past.
        teacherEmail:
          type: string
          format: email
          nullable: true

    SpawnRequest:
      type: object
      required: [classes]
      properties:
        classes:
          type: array
          minItems: 1
          maxItems: 20
          items:
            $ref: '#/components/schemas/SpawnClassInput'

    SpawnedClass:
      type: object
      required: [id, name, startDate, teacherId, teacherEmail, pendingTeacherEmail, teacherStatus, teacherAssignmentReason]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        startDate:
          type: string
          format: date
        teacherId:
          type: string
          format: uuid
          nullable: true
          description: Set for Branches A + B; null for Branches C + D.
        teacherEmail:
          type: string
          format: email
          nullable: true
          description: Set for Branches A + B (from `users.email`); null for Branches C + D — privacy per AC3 (do NOT leak "email exists in system").
        pendingTeacherEmail:
          type: string
          format: email
          nullable: true
          description: Set for Branch C only (from payload, normalized to lowercase); null otherwise.
        teacherStatus:
          type: string
          enum: [assigned, invited, unassigned]
        teacherAssignmentReason:
          type: string
          enum: [explicit_self, explicit_member, founder_auto, invited, unassigned]

    SpawnInviteEntry:
      type: object
      required: [email, classIndices, enqueued, reusedExistingInvite, expiresAt]
      properties:
        email:
          type: string
          format: email
          description: Lowercased invited email.
        classIndices:
          type: array
          items:
            type: integer
            minimum: 0
          description: |
            **0-indexed** payload-order class indices this invite covers.
            Clients rendering "invite N went to <email>" copy MUST convert
            to 1-based for display (C2-06 review fix — spec previously
            didn't specify the indexing base).
        enqueued:
          type: boolean
          description: Return value of `EmailRetryQueue.Enqueue` for newly-created invites; false when reusing an existing invite or when the retry queue buffer is full.
        reusedExistingInvite:
          type: boolean
          description: True when a pre-existing active invite was reused (dedup at DB via `idx_invites_center_email_active`); false when a new row was written this call.
        expiresAt:
          type: string
          format: date-time

    SpawnResult:
      type: object
      required: [classes, invites, invitesSent]
      properties:
        classes:
          type: array
          items:
            $ref: '#/components/schemas/SpawnedClass'
        invites:
          type: array
          items:
            $ref: '#/components/schemas/SpawnInviteEntry'
        invitesSent:
          type: integer
          description: Count of newly-created invite rows that were also enqueued=true (dedup-reused OR buffer-full invites are excluded).

    # ---------------- Envelopes ----------------
