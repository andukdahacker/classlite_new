openapi: "3.1.0"
info:
  title: ClassLite API
  version: "0.1.0"
  description: Multi-tenant education management platform API
servers:
  - url: http://localhost:8080
    description: Local development
paths:
  /health:
    get:
      operationId: healthCheck
      summary: Health check
      description: Returns the current health status of the API
      responses:
        "200":
          description: API is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "ok"
                required:
                  - status

  /api/auth/register:
    post:
      operationId: registerUser
      summary: Email/password registration (story 1.4)
      description: |
        Creates a new user account and sends a verification email. The
        `emailDelivery` field in the response is always present:
        `"sent"` when the verification email was enqueued cleanly,
        `"failed"` when the retry queue rejected the job (buffer full — no
        async retry will occur; the client should prompt the user to hit
        Resend Verification). `"delayed"` is reserved for future use cases.
        Returns 409 EMAIL_ALREADY_REGISTERED for any duplicate regardless of
        verification status (anti-enumeration).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeRegisterResult'
        "409":
          description: Email already registered (ambiguous — does not reveal verification status)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        "422":
          description: Validation failure or malformed JSON body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        "429":
          description: Per-IP rate limit exceeded (token bucket — burst 5, replenishment 1 every 2 min)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /api/auth/verify-email:
    post:
      operationId: verifyEmail
      summary: Verify email via token (story 1.4)
      description: |
        Consumes the verification token, sets `users.email_verified = true`,
        and invalidates any other unconsumed tokens for the same user. The
        operation is idempotent — replaying any prior-issued token after the
        user is verified also returns 200.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifyEmailRequest'
      responses:
        "200":
          description: Verified (or idempotent replay)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeVerifyEmailResult'
        "404":
          description: Token does not exist (VERIFICATION_TOKEN_INVALID)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        "410":
          description: |
            Token expired — the link is older than 24 hours and the user has
            not verified yet (VERIFICATION_TOKEN_EXPIRED). Rotated-out tokens
            (a newer resend has been issued) DO NOT return 410 on their own —
            once the user is verified, replaying any prior-issued token
            returns 200 idempotent.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        "422":
          description: Validation failure (missing token) or malformed JSON body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /api/auth/resend-verification:
    post:
      operationId: resendVerification
      summary: Resend verification email (story 1.4)
      description: |
        Rotates the user's verification token (invalidating any prior
        unconsumed tokens) and sends a new email. Returns 200 with
        `verifyPollId: null` when the email is unknown OR already verified,
        to prevent enumeration. All 200 responses are padded to ≥ 200 ms.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResendVerificationRequest'
      responses:
        "200":
          description: |
            Ambiguous success. `verifyPollId` is null when the email is
            unknown or already verified.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeResendResult'
        "422":
          description: Invalid email format or malformed JSON body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        "429":
          description: |
            Rate limit exceeded — either the per-IP token bucket (burst 5, 1
            token / 2 min) or the per-email bucket (1 token / 60 s).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /api/auth/login:
    post:
      operationId: login
      summary: Email/password login (story 1.5)
      description: |
        Verifies credentials and issues a 15-minute access token + a refresh
        token (7d default, 30d with rememberMe). The refresh token is set as
        an httpOnly cookie (all four cookie attributes per AC10); the
        response body NEVER includes the refresh token. After 5 failed
        attempts within 10 minutes, the account is locked for 15 minutes —
        subsequent attempts (even with the correct password) return 429
        ACCOUNT_LOCKED with a Retry-After header.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        "200":
          description: Authenticated. Set-Cookie carries the refresh token (httpOnly, Secure, SameSite=Lax, Domain=.classlite.app).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeLoginResult'
        "401":
          description: INVALID_CREDENTIALS — wrong email or password (indistinguishable from unknown email).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        "422":
          description: Validation failure or malformed JSON body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        "429":
          description: ACCOUNT_LOCKED (5 failed attempts in 10 min, locked 15 min) OR per-IP RATE_LIMIT_EXCEEDED.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /api/auth/refresh:
    post:
      operationId: refreshToken
      summary: Rotate session tokens (story 1.5)
      description: |
        Atomically DELETEs the presented refresh token row and INSERTs a
        fresh one in the same family. Reuse of a rotated-out token triggers
        family revocation (every refresh in the family is deleted), and the
        response is 401 REFRESH_TOKEN_REUSE_DETECTED.
      responses:
        "200":
          description: Rotated. New refresh cookie set; new access token in body.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeLoginResult'
        "401":
          description: REFRESH_TOKEN_INVALID (no row + no family) or REFRESH_TOKEN_REUSE_DETECTED (family revoked).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /api/auth/logout:
    post:
      operationId: logout
      summary: Invalidate refresh token and clear cookie (story 1.5)
      description: |
        Hard-deletes the matching refresh_tokens row and emits a clearing
        Set-Cookie. Idempotent — unknown / missing / already-revoked
        cookies still return 200.
      responses:
        "200":
          description: Logged out. Set-Cookie clears the refresh cookie.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeLogoutResult'

  /api/auth/forgot-password:
    post:
      operationId: forgotPassword
      summary: Request password-reset email (story 1.5)
      description: |
        Sends a reset email (1 hour TTL) when the email is known and
        verified. Returns the same 200 envelope for unknown / unverified
        emails — anti-enumeration. All 200 responses are padded to ≥ 200ms.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ForgotPasswordRequest'
      responses:
        "200":
          description: Ambiguous success. Reset email may or may not have been sent.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeForgotPasswordResult'
        "422":
          description: Invalid email format or malformed body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        "429":
          description: Per-IP (5 / 2min) or per-email (3 / 60s) rate-limit exceeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /api/auth/reset-password:
    post:
      operationId: resetPassword
      summary: Apply password reset (story 1.5)
      description: |
        Consumes the reset token, updates the password, DELETEs every
        refresh_tokens row for the user (force re-login everywhere), and
        clears login_attempts. Replaying a consumed token returns 409
        RESET_TOKEN_CONSUMED; an expired token returns 410
        RESET_TOKEN_EXPIRED.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResetPasswordRequest'
      responses:
        "200":
          description: Password reset
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeResetPasswordResult'
        "404":
          description: RESET_TOKEN_INVALID — token does not exist.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        "409":
          description: RESET_TOKEN_CONSUMED — token was already used.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        "410":
          description: RESET_TOKEN_EXPIRED — token TTL elapsed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        "422":
          description: Validation failure (password length) or malformed body.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /api/auth/google:
    get:
      operationId: googleInit
      summary: Initiate Google OAuth sign-in (story 1.6)
      description: |
        Generates a CSRF-bound signed state token, sets the `oauth_state`
        httpOnly cookie (Path=/api/auth, Max-Age=600), and 302-redirects to
        Google's authorization URL. Optional `inviteToken` is verified
        pre-flight to short-circuit a wasted Google round-trip; `redirectTo`
        is honored only when it matches the same-origin allowlist.
      parameters:
        - in: query
          name: inviteToken
          required: false
          schema:
            type: string
            maxLength: 256
        - in: query
          name: redirectTo
          required: false
          schema:
            type: string
            maxLength: 1024
      responses:
        "302":
          description: Redirect to Google authorization URL. Sets `oauth_state` cookie.
          headers:
            Location:
              schema:
                type: string
              description: Google's authorization URL with `state=<signed>` query param.
            Set-Cookie:
              schema:
                type: string
              description: |
                `oauth_state=<signed>; HttpOnly; Secure; SameSite=Lax; Path=/api/auth; Max-Age=600`
                (Domain set in non-dev).
        "404":
          description: INVITE_NOT_FOUND — inviteToken was supplied but the invite no longer exists.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        "410":
          description: INVITE_EXPIRED — inviteToken was supplied but the invite has expired. Details carry `{ centerName, inviterEmail }`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        "409":
          description: INVITE_ALREADY_ACCEPTED — the invite has already been redeemed. Details carry `{ centerName }`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        "400":
          description: INVALID_INVITE_TOKEN — supplied token exceeds the 256-char cap.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        "503":
          description: OAUTH_NOT_CONFIGURED — operator left Google credentials empty (dev parity only).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /api/auth/google/callback:
    get:
      operationId: googleCallback
      summary: Google OAuth callback (story 1.6)
      description: |
        Always returns 302. Success → `APP_POST_LOGIN_URL` plus
        `?invited=true&center=<name>` when an invite was accepted, or
        `?error=<code>` for invite-recoverable failures. Failure →
        `APP_LOGIN_ERROR_URL_BASE?error=<code>`. Codes: `csrf_invalid`,
        `csrf_expired`, `google_exchange_failed`, `google_userinfo_failed`,
        `google_timeout`, `google_email_unverified`, `google_access_denied`,
        `google_server_error`, `oauth_wrong_tenant`, `google_link_race`,
        `invite_email_mismatch`, `invite_expired`, `invite_already_accepted`.
        The `oauth_state` cookie is cleared on every exit path.
        OAUTH_NOT_CONFIGURED is the only response that is NOT a 302 — it
        emits a 503 JSON envelope so operator monitoring picks it up.
      parameters:
        - in: query
          name: code
          required: false
          schema:
            type: string
        - in: query
          name: state
          required: false
          schema:
            type: string
        - in: query
          name: error
          required: false
          schema:
            type: string
      responses:
        "302":
          description: Browser-navigation redirect — success or failure carries the outcome in the Location query string.
          headers:
            Location:
              schema:
                type: string
            Set-Cookie:
              schema:
                type: string
              description: |
                `refresh_token=<value>` on success (per AC10 from story 1.5)
                AND `oauth_state=; Max-Age=0` (replay defense).

  /api/auth/accept-invite:
    post:
      operationId: acceptInvite
      summary: Accept a staff invite via email/password (story 1.6)
      description: |
        Two branches based on whether the invite email matches an existing
        user. New users supply `fullName` + `password`; existing users
        omit both. The invite link is the email verification — accepted
        users land with `emailVerified: true`. Per-IP rate limited
        (10 / 60s) to defend against token enumeration.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AcceptInviteRequest'
      responses:
        "200":
          description: Invite accepted, session issued.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeAcceptInviteResult'
        "404":
          description: INVITE_NOT_FOUND — the token does not match a row.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        "410":
          description: INVITE_EXPIRED — surfaces details `{ centerName, inviterEmail }` so the SPA can render UX recovery.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        "409":
          description: INVITE_ALREADY_ACCEPTED / INVITE_EMAIL_MISMATCH / PASSWORD_NOT_ALLOWED_FOR_OAUTH_USER / GOOGLE_ID_ALREADY_LINKED.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        "422":
          description: VALIDATION_ERROR — missing fullName/password on new-user branch, or malformed body.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        "429":
          description: Per-IP rate limit (10 / 60s) exceeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /api/admin/users/{userId}/force-logout:
    post:
      operationId: forceLogout
      summary: Owner-initiated force-logout for a staff member (story 1.6 / FR-80)
      description: |
        Bulk-deletes every `refresh_tokens` row for the target user.
        Documented limitation: access tokens already issued remain valid
        for up to AccessTokenTTL (15 min) — EDGE-2 tradeoff accepted.
        Cross-tenant targets return 404 USER_NOT_FOUND (NEVER 403, which
        would leak existence). Requires authenticated Owner JWT.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: userId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Sessions revoked.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeForceLogoutResult'
        "401":
          description: AUTH_REQUIRED — missing or invalid bearer token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        "403":
          description: INSUFFICIENT_ROLE — caller is not an Owner.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        "404":
          description: USER_NOT_FOUND — target does not exist in the caller's tenant (cross-tenant attempts also collapse here).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        "422":
          description: VALIDATION_ERROR — malformed UUID.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /api/auth/verify-status:
    get:
      operationId: verifyStatus
      summary: Poll current verification state (story 1.4)
      description: |
        Returns the user's current `emailVerified` state given a poll ID. The
        poll ID is the `email_verifications.id` of the row issued at
        registration or resend. Poll IDs expire 24 hours after creation,
        matching the verification token TTL. Unknown, malformed, or expired
        poll IDs all return the same 404 POLL_ID_NOT_FOUND.
      parameters:
        - in: query
          name: pollId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Current verification status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeVerifyStatusResult'
        "404":
          description: Poll ID not found, malformed, or expired (POLL_ID_NOT_FOUND)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  # ---------------- Story 2.1 — Onboarding + Center setup ----------------

  /api/onboarding/persona:
    post:
      operationId: setOnboardingPersona
      summary: Set the authenticated user's persona (story 2.1)
      description: |
        Writes the caller's persona choice to `users.persona`. Idempotent — a
        repeat POST with the same value returns 200, not 409, so the wizard
        may hit this on browser back. Unknown persona values → 422.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetPersonaRequest'
      responses:
        "200":
          description: Persona persisted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeSetPersonaResult'
        "401":
          description: Missing (AUTH_REQUIRED) or invalid (AUTH_INVALID) access token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        "403":
          description: Email not verified (EMAIL_VERIFICATION_REQUIRED)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        "422":
          description: Validation failure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        "429":
          description: Rate limit exceeded (RATE_LIMIT_EXCEEDED); Retry-After header carries the retry window in seconds
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /api/centers:
    post:
      operationId: createCenter
      summary: Create a center + bind creator as Owner (story 2.1)
      description: |
        Single transaction — inserts the center row, generates a unique
        `shortCode` (slug + retry), inserts `center_members` with role=owner,
        writes an `audit_logs` row `center.created`, and returns a fresh
        access token whose claims include the new center+role. v1 supports
        one center per user — a repeat attempt returns 409
        USER_ALREADY_HAS_CENTER.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCenterRequest'
      responses:
        "201":
          description: Center created, caller bound as Owner, fresh JWT returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeCreateCenterResult'
        "401":
          description: Missing (AUTH_REQUIRED) or invalid (AUTH_INVALID) access token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        "403":
          description: Email not verified (EMAIL_VERIFICATION_REQUIRED)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        "409":
          description: Caller already has a center (USER_ALREADY_HAS_CENTER)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        "422":
          description: Validation failure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        "429":
          description: Rate limit exceeded (RATE_LIMIT_EXCEEDED); Retry-After header carries the retry window in seconds
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        "500":
          description: Slug regeneration exhausted after 5 attempts (INTERNAL_ERROR)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /api/centers/{id}:
    get:
      operationId: getCenterProfile
      summary: Fetch center profile — Owner-only, tenant-bound (story 2-5a)
      description: |
        Returns the caller's center profile (Owner-only per AC2). The
        path `{id}` MUST equal the caller's tenant-context centerID; a
        mismatch returns 403 `TENANT_MISMATCH`. `centers` is a global
        table (no RLS), so the tenant check happens at the handler layer.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Center profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeCenterProfile'
        "401":
          description: Missing (AUTH_REQUIRED) or invalid (AUTH_INVALID) access token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        "403":
          description: |
            INSUFFICIENT_ROLE (non-Owner), TENANT_MISMATCH (path id ≠ caller's centerID),
            or EMAIL_VERIFICATION_REQUIRED.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        "404":
          description: Center not found (CENTER_NOT_FOUND)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        "429":
          description: Rate limit exceeded (RATE_LIMIT_EXCEEDED); Retry-After header carries the retry window in seconds
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        "500":
          description: Internal error (INTERNAL_ERROR)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

    patch:
      operationId: updateCenterProfile
      summary: Partial-update center profile — Owner-only (story 2-5a)
      description: |
        Partial update of name / contactEmail / brandColor / logoUrl / timezone.
        Only present fields update; omitted fields are left unchanged (COALESCE
        pattern in the SQL layer). `shortCode` is intentionally absent from
        the request schema — the Settings UI renders it as a read-only input
        (AC3) and any client that sends it is silently ignored by the API.
        Timezone must be one of the 30-entry IANA whitelist (see enum below);
        anything else returns 422 `UNSUPPORTED_TIMEZONE`.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCenterProfileRequest'
      responses:
        "200":
          description: Updated center profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvelopeCenterProfile'
        "401":
          description: Missing (AUTH_REQUIRED) or invalid (AUTH_INVALID) access token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        "403":
          description: |
            INSUFFICIENT_ROLE (non-Owner), TENANT_MISMATCH (path id ≠ caller's centerID),
            or EMAIL_VERIFICATION_REQUIRED.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        "404":
          description: Center not found (CENTER_NOT_FOUND)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        "422":
          description: |
            Validation failure — name length, invalid contactEmail, or
            UNSUPPORTED_TIMEZONE (timezone not in 30-entry whitelist).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        "429":
          description: Rate limit exceeded (RATE_LIMIT_EXCEEDED); Retry-After header carries the retry window in seconds
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        "500":
