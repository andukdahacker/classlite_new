        "422":
          description: |
            Validation failure (VALIDATION_ERROR at envelope level). `error.details[*].code` may include: `INVALID_TEACHER_EMAIL`, `SELF_INVITE_BLOCKED`. Other field-level codes are empty (`""`) and rely on `error.details[*].field` + `error.details[*].message` for surfacing (cohortName length, startDate drift, class count, malformed JSON). C2-08 review fix — the enumeration is not exhaustive.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        "429":
          description: Rate limit exceeded (spawnLimit 5/min IP + onboardingLimit 20/min IP)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        "500":
          description: Unexpected server error (INTERNAL_ERROR)
          content:
            application/json:
