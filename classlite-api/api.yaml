  # settingsChain middleware (ExtractTenant → RequireVerifiedEmail →
  # RequireCenterContext → RequireRole("owner") → settingsRateLimit → handler).
  # AC6: POST/PATCH /api/rooms may return 409 ROOM_NAME_TAKEN on UNIQUE
  # (center_id, LOWER(name)) collision. AC10: mutating operations emit
  # `center.{term|holiday|room}.{created|updated|deleted}` audit rows.
