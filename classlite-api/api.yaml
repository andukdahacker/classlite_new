    # ---------------- Error envelope ----------------
    FieldError:
      type: object
      required: [field, message]
      properties:
        field:
          type: string
        code:
          type: string
          description: |
            Optional per-field UPPER_SNAKE_CASE identifier (e.g.
            INVALID_TEACHER_EMAIL, SELF_INVITE_BLOCKED) — populated for
            error-catalog fields; empty string OR omitted when the error
            carries only a prose message. Story 1.x handlers pre-date the
            catalog and emit `""` for `code`; Story 2.2+ handlers populate
            it where the wizard router needs to key on the field-level
            code. C2-03 review fix — was `required` under Story 2.2's
            initial pass, which broke JSON-Schema validators for pre-2.2
            envelopes that didn't emit the key.
        message:
          type: string

    ErrorBody:
      type: object
      required: [code, message, requestId, details]
      properties:
        code:
          type: string
          description: UPPER_SNAKE_CASE error code (e.g., VALIDATION_ERROR, EMAIL_ALREADY_REGISTERED, VERIFICATION_TOKEN_EXPIRED).
        message:
          type: string
        requestId:
          type: string
        details:
          oneOf:
            - type: 'null'
            - type: array
              items:
                $ref: '#/components/schemas/FieldError'

    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          $ref: '#/components/schemas/ErrorBody'

    # ---------------- Story 1.6 — Google OAuth + Invite Acceptance + Force-Logout ----------------
    AcceptInviteRequest:
      type: object
      required: [inviteToken]
      properties:
        inviteToken:
          type: string
          minLength: 1
          maxLength: 256
        fullName:
          type: string
          minLength: 1
          maxLength: 200
          nullable: true
          description: Required only on the new-user branch.
        password:
          type: string
          minLength: 8
          maxLength: 72
          nullable: true
          description: Required only on the new-user branch.

    InviteCenter:
      type: object
      required: [id, name]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string

    AcceptInviteResult:
      type: object
      required: [accessToken, user, center, role]
      properties:
        accessToken:
          type: string
        user:
          $ref: '#/components/schemas/UserSummary'
        center:
          $ref: '#/components/schemas/InviteCenter'
        role:
          type: string
          enum: [owner, admin, teacher, student]

    EnvelopeAcceptInviteResult:
      type: object
      required: [data]
      properties:
        data:
          $ref: '#/components/schemas/AcceptInviteResult'

    ForceLogoutResult:
      type: object
      required: [forcedLogout, sessionsRevoked]
      properties:
        forcedLogout:
          type: boolean
        sessionsRevoked:
          type: integer
          minimum: 0
          description: Number of refresh_tokens rows deleted for the target.

    EnvelopeForceLogoutResult:
      type: object
      required: [data]
      properties:
        data:
          $ref: '#/components/schemas/ForceLogoutResult'

    # Detail payloads echoed in invite error envelopes.
    InviteExpiredDetails:
      type: object
      required: [centerName, inviterEmail]
      properties:
        centerName:
          type: string
        inviterEmail:
          type: string
          format: email

    InviteAlreadyAcceptedDetails:
      type: object
      required: [centerName]
      properties:
        centerName:
          type: string

    InviteEmailMismatchDetails:
      type: object
      required: [invitedEmail, oauthEmail]
      properties:
        invitedEmail:
          type: string
          format: email
        oauthEmail:
          type: string
          format: email

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
