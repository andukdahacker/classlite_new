      properties:
        name:
          type: string
          minLength: 1
          maxLength: 120
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
        sessionCount:
          type: integer
          nullable: true
          minimum: 1

    Holiday:
      type: object
      required: [id, centerId, name, date]
      properties:
        id:
          type: string
          format: uuid
        centerId:
          type: string
          format: uuid
        name:
          type: string
          minLength: 1
          maxLength: 120
        date:
          type: string
          format: date

    CreateHolidayRequest:
      type: object
      required: [name, date]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 120
        date:
          type: string
          format: date

    UpdateHolidayRequest:
